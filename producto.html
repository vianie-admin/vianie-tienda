<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vianie Jewelry - Detalle del Producto</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* Estilos para las flechas de la galería */
    .galeria-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .btn-galeria {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(255, 255, 255, 0.7);
      border: none;
      color: #333;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: none; 
      z-index: 10;
      transition: background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-galeria:hover {
      background-color: rgba(255, 255, 255, 1);
    }
    #btn-prev { left: 10px; }
    #btn-next { right: 10px; }

    /* NUEVO: Estilos para la imagen ampliada (Lightbox) */
    .imagen-clickeable { 
      cursor: pointer; 
    }
    .modal-lightbox {
      display: none; /* Oculto por defecto */
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
    }
    .modal-contenido {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .cerrar-modal {
      position: absolute;
      top: 15px;
      right: 25px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
    }
    .cerrar-modal:hover { color: #b68d40; }
  </style>
</head>
<body>

  <div id="modal-imagen" class="modal-lightbox">
    <span class="cerrar-modal" id="btn-cerrar-modal">&times;</span>
    <img class="modal-contenido" id="img-ampliada">
  </div>

  <nav class="top-navbar">
    <div class="back-action">
        <a href="index.html" class="back-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
          Volver
        </a>
    </div>

    <div class="logo">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#b68d40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12l4 6-10 12L2 9z"/>
      </svg>
      <span class="logo-text">VIANIE</span>
    </div>
  </nav>

  <main class="product-detail-container">
    
    <div class="product-main-grid">
      
      <div class="product-image-column">
        <div class="galeria-wrapper">
          <div class="image-container-detail" id="contenedor-imagen">
              <div class="image-placeholder-detail">CARGANDO IMAGEN...</div>
          </div>
          <button id="btn-prev" class="btn-galeria" style="display: none;">❮</button>
          <button id="btn-next" class="btn-galeria" style="display: none;">❯</button>
        </div>
      </div>

      <div class="product-info-column">
        <h1 id="product-name" class="product-title"></h1>
        
        <div class="product-meta">
          <span id="product-price" class="price-detail">bs.-</span>
          <span id="product-material" class="material-tag-detail"></span>
        </div>

        <p class="product-description">
          Hermosa pieza fabricada en Acero Inoxidable de alta calidad, resistente al agua y perfecta para el uso diario. El toque de elegancia que tu estilo necesita.
        </p>
        
        <p class="envio-tag">Envíos a domicilio en Santa Cruz.</p>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <a href="#" id="whatsapp-btn-1" class="whatsapp-purchase-btn" target="_blank">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                 <path d="M.057 24l1.687-6.162c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.56 5.338-11.892 11.901-11.892 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.404 0 6.56-5.338 11.892-11.901 11.892-2.01 0-3.987-.506-5.741-1.465l-6.253 1.641zm11.901-20.814c-4.909 0-8.905 3.996-8.905 8.906 0 2.055.707 3.97 2.001 5.485l-1.094 3.991 4.089-1.071c1.464.845 3.134 1.29 4.849 1.29 4.909 0 8.905-3.996 8.905-8.906 0-4.91-3.996-8.906-8.905-8.906zm5.241 12.601c-.287-.144-1.698-.838-1.961-.934-.263-.096-.454-.144-.646.144-.192.288-.742.934-.908 1.127-.166.192-.331.216-.618.072-.287-.144-1.211-.447-2.308-1.425-.853-.762-1.43-1.702-1.597-1.99-.166-.288-.018-.444.126-.587.13-.13.287-.336.431-.504.144-.168.192-.288.287-.48.096-.192.048-.36-.024-.504-.072-.144-.646-1.56-.885-2.136-.233-.56-.469-.484-.646-.492-.167-.008-.36-.01-.552-.01s-.504.072-.768.36c-.263.288-1.006.984-1.006 2.399 0 1.416 1.031 2.784 1.175 2.976.144.192 2.03 3.1 4.916 4.347.687.297 1.223.474 1.64.607.69.219 1.318.188 1.815.114.553-.082 1.698-.694 1.937-1.366.239-.672.239-1.248.167-1.367-.071-.118-.263-.192-.55-.336z"/>
              </svg>
              Pedir a Contacto 1
            </a>
            
            <a href="#" id="whatsapp-btn-2" class="whatsapp-purchase-btn" target="_blank" style="background-color: #0b695e;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                 <path d="M.057 24l1.687-6.162c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.56 5.338-11.892 11.901-11.892 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.404 0 6.56-5.338 11.892-11.901 11.892-2.01 0-3.987-.506-5.741-1.465l-6.253 1.641zm11.901-20.814c-4.909 0-8.905 3.996-8.905 8.906 0 2.055.707 3.97 2.001 5.485l-1.094 3.991 4.089-1.071c1.464.845 3.134 1.29 4.849 1.29 4.909 0 8.905-3.996 8.905-8.906 0-4.91-3.996-8.906-8.905-8.906zm5.241 12.601c-.287-.144-1.698-.838-1.961-.934-.263-.096-.454-.144-.646.144-.192.288-.742.934-.908 1.127-.166.192-.331.216-.618.072-.287-.144-1.211-.447-2.308-1.425-.853-.762-1.43-1.702-1.597-1.99-.166-.288-.018-.444.126-.587.13-.13.287-.336.431-.504.144-.168.192-.288.287-.48.096-.192.048-.36-.024-.504-.072-.144-.646-1.56-.885-2.136-.233-.56-.469-.484-.646-.492-.167-.008-.36-.01-.552-.01s-.504.072-.768.36c-.263.288-1.006.984-1.006 2.399 0 1.416 1.031 2.784 1.175 2.976.144.192 2.03 3.1 4.916 4.347.687.297 1.223.474 1.64.607.69.219 1.318.188 1.815.114.553-.082 1.698-.694 1.937-1.366.239-.672.239-1.248.167-1.367-.071-.118-.263-.192-.55-.336z"/>
              </svg>
              Pedir a Contacto 2
            </a>
        </div>

      </div>
    </div>

  </main>

  <script>
    function obtenerParametroUrl(nombreParametro) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(nombreParametro);
    }

    const idProducto = obtenerParametroUrl('id');
    const nombreProducto = obtenerParametroUrl('nombre');
    const precioProducto = obtenerParametroUrl('precio');
    const materialProducto = obtenerParametroUrl('material');

    if (nombreProducto && precioProducto && idProducto) {
      document.title = `Vianie Jewelry - ${nombreProducto}`;
      document.getElementById('product-name').innerText = nombreProducto;
      document.getElementById('product-price').innerText = precioProducto;
      document.getElementById('product-material').innerText = materialProducto;

      const mensajeBase = `Hola Vianie! 👋 Vengo de la página web y me gustaría comprar este accesorio:\n\n*Producto:* ${nombreProducto}\n*Material:* ${materialProducto}\n*Precio:* ${precioProducto} bs.-`;
      const mensajeCodificado = encodeURIComponent(mensajeBase);

      Promise.all([
        fetch("configuracion.json?t=" + new Date().getTime()).then(r => r.json()).catch(() => ({})),
        fetch("productos.json?t=" + new Date().getTime()).then(r => r.json()).catch(() => ({ articulos: [] }))
      ]).then(([config, datosProductos]) => {
         
         const ws1 = config.ws_1 || "59177163648";
         const ws2 = config.ws_2 || "59176175389";
         document.getElementById('whatsapp-btn-1').href = `https://wa.me/${ws1}?text=${mensajeCodificado}`;
         document.getElementById('whatsapp-btn-2').href = `https://wa.me/${ws2}?text=${mensajeCodificado}`;

         // Construir la Galería de Imágenes
         const articulos = datosProductos.articulos || [];
         const productoActual = articulos.find(p => p.nombre === nombreProducto);
         
         let listaImagenes = [idProducto.trim()];
         
         if (productoActual && productoActual.galeria && productoActual.galeria.length > 0) {
             listaImagenes = listaImagenes.concat(productoActual.galeria);
         }

         const contenedor = document.getElementById('contenedor-imagen');
         contenedor.innerHTML = ''; 
         
         const imgElement = document.createElement('img');
         imgElement.src = listaImagenes[0];
         imgElement.style.width = '100%';
         imgElement.style.height = '100%';
         imgElement.style.objectFit = 'cover';
         imgElement.classList.add('imagen-clickeable'); // Le decimos que se puede cliquear
         contenedor.appendChild(imgElement);

         // LÓGICA DEL LIGHTBOX (IMAGEN AMPLIADA)
         const modal = document.getElementById('modal-imagen');
         const imgAmpliada = document.getElementById('img-ampliada');
         const btnCerrar = document.getElementById('btn-cerrar-modal');

         // Al hacer clic en la imagen de la galería, se abre en grande
         imgElement.addEventListener('click', () => {
             modal.style.display = 'flex';
             imgAmpliada.src = imgElement.src; // Pone la misma foto que estabas viendo
         });

         // Botón X para cerrar
         btnCerrar.addEventListener('click', () => {
             modal.style.display = 'none';
         });

         // Si hacen clic en lo negro fuera de la imagen, también se cierra
         modal.addEventListener('click', (e) => {
             if (e.target === modal) {
                 modal.style.display = 'none';
             }
         });

         // Activar botones manuales solo si hay más de 1 foto
         if (listaImagenes.length > 1) {
             const btnPrev = document.getElementById('btn-prev');
             const btnNext = document.getElementById('btn-next');
             
             btnPrev.style.display = 'flex';
             btnNext.style.display = 'flex';
             
             let indice = 0;
             
             btnNext.addEventListener('click', () => {
                 indice = (indice + 1) % listaImagenes.length;
                 imgElement.src = listaImagenes[indice];
             });
             
             btnPrev.addEventListener('click', () => {
                 indice = (indice - 1 + listaImagenes.length) % listaImagenes.length;
                 imgElement.src = listaImagenes[indice];
             });
         }
      });
    } else {
      document.body.innerHTML = '<div style="text-align:center; padding:50px;">Producto no encontrado. <br><br> <a href="index.html">Volver al catálogo</a></div>';
    }
  </script>

</body>
</html>
