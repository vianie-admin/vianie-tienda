  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <nav class="top-navbar">
    <div class="back-action">

            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
          Volver

    </div>

    <div class="logo">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#b68d40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12l4 6-10 12L2 9z"/>
      </svg>

  <main class="product-detail-container">
    
    <div class="product-main-grid">
      
      <div class="product-image-column">
        <!-- AQUÍ ESTÁ LA CORRECCIÓN DEL ID: id="contenedor-imagen" -->
        <div class="image-container-detail" id="contenedor-imagen">
            <div class="image-placeholder-detail">CARGANDO IMAGEN...</div>
        </div>
      </div>

      <div class="product-info-column">
        <h1 id="product-name" class="product-title"></h1>
        
        <div class="product-meta">
          <span id="product-price" class="price-detail">bs.-</span>
          <span id="product-material" class="material-tag-detail"></span>
        </div>

        <p class="product-description">
          Hermosa pieza fabricada en Acero Inoxidable de alta calidad, resistente al agua y perfecta para el uso diario. El toque de elegancia que tu estilo necesita.
        </p>
        
        <p class="envio-tag">Envíos a domicilio en Santa Cruz.</p>

              Pedir a Contacto 2
            </a>
        </div>

      </div>
    </div>

  </main>

  <script>
    // Los dos números de WhatsApp
    const numeroSocia1 = "59177163648"; 
    const numeroSocia2 = "59176175389";

    function obtenerParametroUrl(nombreParametro) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(nombreParametro);
    }

    const idProducto = obtenerParametroUrl('id');
    const nombreProducto = obtenerParametroUrl('nombre');
    const precioProducto = obtenerParametroUrl('precio');
    const materialProducto = obtenerParametroUrl('material');

    if (nombreProducto && precioProducto && idProducto) {
      document.title = `Vianie Jewelry - ${nombreProducto}`;
      document.getElementById('product-name').innerText = nombreProducto;
      document.getElementById('product-price').innerText = precioProducto;
      document.getElementById('product-material').innerText = materialProducto;
      
      const imagenReal = document.createElement('img');
      const nombreImagenLimpio = idProducto.trim(); 
      imagenReal.src = nombreImagenLimpio; 
      imagenReal.alt = nombreProducto;
      imagenReal.style.width = '100%';
      imagenReal.style.height = '100%';
      imagenReal.style.objectFit = 'cover';
      
      const contenedor = document.getElementById('contenedor-imagen');
      contenedor.innerHTML = '';
      contenedor.appendChild(imagenReal);
      
      // Armamos el mensaje para WhatsApp
      const mensajeBase = `Hola Vianie! 👋 Vengo de la página web y me gustaría comprar este accesorio:\n\n*Producto:* ${nombreProducto}\n*Material:* ${materialProducto}\n*Precio:* ${precioProducto} bs.-`;
      const mensajeCodificado = encodeURIComponent(mensajeBase);
      
      // Le asignamos el link a cada botón con su respectivo número
      document.getElementById('whatsapp-btn-1').href = `https://wa.me/${numeroSocia1}?text=${mensajeCodificado}`;
      document.getElementById('whatsapp-btn-2').href = `https://wa.me/${numeroSocia2}?text=${mensajeCodificado}`;
    
    } else {
      document.body.innerHTML = '<div style="text-align:center; padding:50px; font-family: sans-serif;">Producto no encontrado. <br><br> <a href="index.html" style="color: #b68d40;">Volver al catálogo</a></div>';
    }
  </script>

</body>
</html>
