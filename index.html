<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vianie Jewelry - Catálogo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <input type="checkbox" id="menu-toggle" class="menu-checkbox">

  <nav class="top-navbar">
    <label for="menu-toggle" class="menu-btn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
      MENÚ
    </label>
    
    <div class="logo">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#b68d40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12l4 6-10 12L2 9z"/>
      </svg>
      <span class="logo-text">VIANIE</span>
    </div>

    <div class="user-actions" style="display: flex; gap: 10px;">
       <a href="https://wa.me/59177163648?text=Hola%20Vianie!%20Me%20gustaría%20hacer%20una%20consulta." target="_blank" class="contact-btn">Contacto 1</a>
       <a href="https://wa.me/59176175389?text=Hola%20Vianie!%20Me%20gustaría%20hacer%20una%20consulta." target="_blank" class="contact-btn">Contacto 2</a>
    </div>
  </nav>

  <label for="menu-toggle" class="menu-overlay"></label>

  <aside class="side-menu">
    <div class="side-menu-header">
      <div class="logo">
        <span class="logo-text">VIANIE</span>
      </div>
      <label for="menu-toggle" class="close-btn">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </label>
    </div>
    <ul class="side-menu-links">
      <li><a href="index.html">Catálogo Completo</a></li>
    </ul>
  </aside>

  <main class="store-container">
    
    <header class="hero-header">
      <h1 class="hero-title">Accesorios en <span class="highlight">Acero Inox</span></h1>
      <p class="hero-subtitle">Descubre nuestra colección de joyas elegantes, minimalistas y duraderas para cada ocasión.</p>
    </header>

    <div id="catalogo-dinamico">
        <p style="text-align:center; padding: 50px; color:#888;">Cargando catálogo...</p>
    </div>

  </main>

  <script>
    // Ahora leemos el archivo JSON automático que crea tu panel de control
    const urlFresca = "productos.json?t=" + new Date().getTime();

    fetch(urlFresca, { cache: "no-store" })
      .then(respuesta => respuesta.json()) // Ahora leemos JSON, no texto
      .then(datos => {
         const contenedor = document.getElementById('catalogo-dinamico');
         contenedor.innerHTML = ''; // Borramos el "Cargando..."

         const categorias = {}; 
         // Extraemos los artículos de la lista del panel. Si no hay, usamos una lista vacía.
         const articulos = datos.articulos || [];

         articulos.forEach(producto => {
            const nombre = producto.nombre || 'Sin Nombre';
            const precio = producto.precio || 0;
            const material = producto.material || '';
            const categoria = producto.categoria || 'Otros';
            // El panel guarda la ruta de la imagen así: "/imagenes/foto.jpeg"
            const imagen = producto.imagen || ''; 
            const agotado = producto.agotado || false; 

            const claseAgotado = agotado ? 'tarjeta-agotada' : '';
            const cartelAgotado = agotado ? '<div class="badge-agotado">AGOTADO</div>' : '';

            // Armamos la tarjeta, enviando la ruta de la imagen directo al link
            const tarjetaHTML = `
              <article class="jewelry-card ${claseAgotado}">
                <a href="producto.html?id=${encodeURIComponent(imagen)}&nombre=${encodeURIComponent(nombre)}&precio=${precio}&material=${encodeURIComponent(material)}">
                  <div class="image-container">
                      <img src="${imagen}" alt="${nombre}" style="width: 100%; height: 100%; object-fit: cover;">
                      ${cartelAgotado}
                  </div>
                  <div class="jewelry-info">
                    <h3>${nombre}</h3>
                    <div class="jewelry-details">
                      <span class="price">${precio} bs.-</span>
                      <span class="material-tag">${material}</span>
                    </div>
                  </div>
                </a>
              </article>
            `;
            
            if (!categorias[categoria]) {
                categorias[categoria] = [];
            }
            categorias[categoria].push(tarjetaHTML);
         });

         let htmlFinal = '';

         for (const cat in categorias) {
             htmlFinal += `<h2 class="category-title">${cat}</h2>`;
             htmlFinal += `<section class="jewelry-grid">`;
             htmlFinal += categorias[cat].join('');
             htmlFinal += `</section>`;
         }

         // Si la tienda está vacía, mostramos un mensaje
         if(htmlFinal === '') {
             htmlFinal = '<p style="text-align:center; padding: 50px; color:#888;">No hay productos en el catálogo todavía.</p>';
         }

         contenedor.innerHTML = htmlFinal;

      })
      .catch(error => {
          console.error("Error al obtener los datos:", error);
          document.getElementById('catalogo-dinamico').innerHTML = '<p style="color:red; text-align:center; padding: 50px;">Aún no se ha creado el catálogo desde el Panel de Administración.</p>';
      });
  </script>

</body>
</html>
