<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vianie Jewelry - Catálogo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <input type="checkbox" id="menu-toggle" class="menu-checkbox">

  <nav class="top-navbar">
    <label for="menu-toggle" class="menu-btn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
      MENÚ
    </label>
    
    <div class="logo">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#b68d40" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12l4 6-10 12L2 9z"/>
      </svg>
      <span class="logo-text">VIANIE</span>
    </div>

    <div class="user-actions" style="display: flex; gap: 10px;">
       <a href="https://wa.me/59177163648?text=Hola%20Vianie!%20Me%20gustaría%20hacer%20una%20consulta." target="_blank" class="contact-btn">Contacto 1</a>
       <a href="https://wa.me/59176175389?text=Hola%20Vianie!%20Me%20gustaría%20hacer%20una%20consulta." target="_blank" class="contact-btn">Contacto 2</a>
    </div>
  </nav>

  <label for="menu-toggle" class="menu-overlay"></label>

  <aside class="side-menu">
    <div class="side-menu-header">
      <div class="logo">
        <span class="logo-text">VIANIE</span>
      </div>
      <label for="menu-toggle" class="close-btn">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </label>
    </div>
    <ul class="side-menu-links">
      <li><a href="index.html">Catálogo Completo</a></li>
    </ul>
  </aside>

  <main class="store-container">
    
    <header class="hero-header">
      <h1 class="hero-title">Accesorios en <span class="highlight">Acero Inox</span></h1>
      <p class="hero-subtitle">Descubre nuestra colección de joyas elegantes, minimalistas y duraderas para cada ocasión.</p>
    </header>

    <div id="catalogo-dinamico">
        <p style="text-align:center; padding: 50px; color:#888;">Cargando catálogo...</p>
    </div>

  </main>

  <script>
    // Cargamos configuraciones y productos al mismo tiempo
    Promise.all([
      fetch("configuracion.json?t=" + new Date().getTime()).then(r => r.json()),
      fetch("productos.json?t=" + new Date().getTime()).then(r => r.json())
    ]).then(([config, datos]) => {
        // 1. Aplicar Ajustes Generales
        document.querySelector('.hero-title').innerHTML = config.titulo_hero.replace("Acero Inox", '<span class="highlight">Acero Inox</span>');
        document.querySelector('.hero-subtitle').innerText = config.desc_hero;
        
        const botonesNav = document.querySelector('.user-actions');
        botonesNav.innerHTML = `
          <a href="https://wa.me/${config.ws_1}?text=Hola!" target="_blank" class="contact-btn">Socia 1</a>
          <a href="https://wa.me/${config.ws_2}?text=Hola!" target="_blank" class="contact-btn">Socia 2</a>
        `;

        // 2. Cargar Productos (el código que ya teníamos pero con config.ws)
        const contenedor = document.getElementById('catalogo-dinamico');
        const categorias = {}; 
        const articulos = datos.articulos || [];

        articulos.forEach(producto => {
            const claseAgotado = producto.agotado ? 'tarjeta-agotada' : '';
            const tarjetaHTML = `
              <article class="jewelry-card ${claseAgotado}">
                <a href="producto.html?id=${encodeURIComponent(producto.imagen)}&nombre=${encodeURIComponent(producto.nombre)}&precio=${producto.precio}&material=${encodeURIComponent(producto.material)}">
                  <div class="image-container">
                      <img src="${producto.imagen}" alt="${producto.nombre}">
                      ${producto.agotado ? '<div class="badge-agotado">AGOTADO</div>' : ''}
                  </div>
                  <div class="jewelry-info">
                    <h3>${producto.nombre}</h3>
                    <div class="jewelry-details">
                      <span class="price">${producto.precio} bs.-</span>
                      <span class="material-tag">${producto.material}</span>
                    </div>
                  </div>
                </a>
              </article>`;
            if (!categorias[producto.categoria]) categorias[producto.categoria] = [];
            categorias[producto.categoria].push(tarjetaHTML);
        });

        let htmlFinal = '';
        for (const cat in categorias) {
            htmlFinal += `<h2 class="category-title">${cat}</h2><section class="jewelry-grid">${categorias[cat].join('')}</section>`;
        }
        contenedor.innerHTML = htmlFinal || '<p>Catálogo vacío.</p>';
    });
  </script>

</body>
</html>
